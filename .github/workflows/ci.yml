name: ci

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: backend (lint, type, test, file-size)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python (from .python-version)
        run: uv python install

      - name: Install Python deps
        run: uv sync --extra dev

      - name: Ruff (lint)
        run: uv run ruff check .

      - name: Mypy (strict on sdk + api)
        # Files list comes from pyproject [tool.mypy]. T3.5.1 added api/.
        run: uv run mypy

      - name: Handler-LOC audit (≤10 logic LOC, NOTES-waivered exceptions only)
        run: uv run python scripts/audit_handlers.py

      - name: Pytest (with coverage)
        run: uv run pytest

      - name: File-size ceiling (≤150 LOC, blanks/comments excluded)
        run: uv run python scripts/check_file_size.py

  frontend:
    name: frontend (lint, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Set up Node 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      - name: ESLint
        run: pnpm lint

      - name: Contrast gate (WCAG AA on theme tokens)
        working-directory: ${{ github.workspace }}
        run: node scripts/check-contrast.mjs

      - name: Em-dash content lint (no U+2014 in shipped copy)
        working-directory: ${{ github.workspace }}
        run: node scripts/check-em-dash.mjs

      - name: Build (tsc -b && vite build)
        run: pnpm build
