name: ci

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: backend (lint, type, test, file-size)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python (from .python-version)
        run: uv python install

      - name: Install Python deps
        run: uv sync --extra dev

      - name: Ruff (lint)
        run: uv run ruff check .

      - name: Mypy (strict on sdk + api)
        # Files list comes from pyproject [tool.mypy]. T3.5.1 added api/.
        run: uv run mypy

      - name: Handler-LOC audit (≤10 logic LOC, NOTES-waivered exceptions only)
        run: uv run python scripts/audit_handlers.py

      - name: Pytest (with coverage)
        run: uv run pytest

      - name: File-size ceiling (≤150 LOC, blanks/comments excluded)
        run: uv run python scripts/check_file_size.py

  frontend:
    name: frontend (lint, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Set up Node 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      - name: ESLint
        run: pnpm lint

      - name: Contrast gate (WCAG AA on theme tokens)
        working-directory: ${{ github.workspace }}
        run: node scripts/check-contrast.mjs

      - name: Em-dash content lint (no U+2014 in shipped copy)
        working-directory: ${{ github.workspace }}
        run: node scripts/check-em-dash.mjs

      - name: Build (tsc -b && vite build)
        run: pnpm build

      - name: Bundle-size gate (raw <= 2MB, gzip <= 600KB per ADR-022)
        working-directory: ${{ github.workspace }}
        run: node scripts/check-bundle-size.mjs

  playwright:
    # Runs both Playwright specs via `pnpm exec playwright test`
    # (testMatch in playwright.config.ts picks up both files):
    #   - cold-start.spec.ts (T6.11 + P6.5/P1-3) — gates cold-start
    #     boot+first-execute ≤ 12 s (ADR-020) and NFR-SBX-2 hot path
    #     ≤ 1.5 s per subsequent run.
    #   - pyodide-e2e.spec.ts (P6.5/P1-2) — drives the T6.10 + T6.12
    #     matrices and FR-SBX-6 against the real Pyodide WASM runtime.
    #     Resolves N037 (Pyodide-actual coverage gap).
    # One job rather than two because the dominant cost is the
    # chromium install (~90 s) + the pnpm build (~30 s); splitting
    # would double that for ~60 s of separate-spec savings.
    name: playwright (cold-start + pyodide-e2e)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Set up Node 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      - name: Install Playwright chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Build (production dist for vite preview)
        run: pnpm build

      - name: Verify dist/ artifacts before Playwright
        # If `pnpm build` silently produced an empty or wrong-location
        # dist/, `vite preview` would hang serving nothing — failure
        # mode would be indistinguishable from a slow bind. List the
        # tree explicitly so the job log shows what preview has to
        # serve before Playwright even starts.
        run: |
          ls -la dist/
          test -f dist/index.html
          test -f dist/cold-start.html
          test -f dist/pyodide-e2e.html

      - name: Playwright gates (cold-start ADR-020 + NFR-SBX-2 + pyodide-e2e P6.5/P1-2)
        run: pnpm exec playwright test
