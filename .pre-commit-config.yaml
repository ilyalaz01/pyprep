# PyPrep pre-commit config — pre-push stage only.
#
# Each hook mirrors a CI step exactly. A passing `git push` means CI
# will pass for the same reasons. CI does NOT run pre-commit; both
# layers run the same underlying commands directly. See CONTRIBUTING.md.
#
# One-time setup per clone:
#   pre-commit install --hook-type pre-push
#
# All hooks use `local` + `language: system` so the binaries come from
# `uv` / `pnpm` (single source of truth) — no version drift between
# this file, pyproject.toml, and CI.

default_stages: [pre-push]

repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff (lint)
        entry: uv run ruff check .
        language: system
        pass_filenames: false

      - id: mypy
        name: mypy (sdk + api strict)
        entry: uv run mypy
        language: system
        pass_filenames: false

      - id: file-size
        name: file-size ceiling (<=150 LOC)
        entry: uv run python scripts/check_file_size.py
        language: system
        pass_filenames: false

      - id: handler-loc-audit
        name: handler-LOC audit (<=10 logic LOC, NOTES-waivered exceptions only)
        entry: uv run python scripts/audit_handlers.py
        language: system
        pass_filenames: false

      - id: frontend-lint
        name: frontend ESLint
        entry: pnpm --dir frontend lint
        language: system
        pass_filenames: false

      - id: frontend-tsc
        name: frontend TypeScript (tsc -b)
        entry: pnpm --dir frontend exec tsc -b
        language: system
        pass_filenames: false

      - id: contrast-gate
        name: contrast gate (WCAG AA on theme tokens)
        entry: node scripts/check-contrast.mjs
        language: system
        pass_filenames: false

      - id: em-dash-gate
        name: em-dash content lint (no U+2014 in shipped copy)
        entry: node scripts/check-em-dash.mjs
        language: system
        pass_filenames: false
