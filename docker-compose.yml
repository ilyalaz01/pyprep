version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: ops/Dockerfile.api.dev
    container_name: pyprep-api
    command: uv run uvicorn pyprep.api.app:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./src:/app/src
      - ./content:/app/content
      - ./tests:/app/tests
      - ./pyprep.db:/app/pyprep.db
    env_file:
      - .env
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/api/health"]
      interval: 10s
      timeout: 3s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: ../ops/Dockerfile.frontend.dev
    container_name: pyprep-frontend
    command: pnpm dev --host 0.0.0.0
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      - api

# Production compose lives in ops/compose.prod.yml (Phase 10).
